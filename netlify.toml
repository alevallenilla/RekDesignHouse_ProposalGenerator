# Redirect old proposal file URL → new path
[[redirects]]
  from = "/Rek_Quote_Proposal_v2.html"
  to   = "/proposal"
  status = 301

# Redirect root → proposal tool (default landing)
[[redirects]]
  from = "/"
  to   = "/proposal"
  status = 302

# Procurement tool
[[redirects]]
  from = "/procurement"
  to   = "/procurement/index.html"
  status = 200

# Procurement Tracker tool
[[redirects]]
  from = "/tracker"
  to   = "/tracker/index.html"
  status = 200

# Procurement Report tool
[[redirects]]
  from = "/report"
  to   = "/report/index.html"
  status = 200

# Project Management tool
[[redirects]]
  from = "/projects"
  to   = "/projects/index.html"
  status = 200
