# Redirect old proposal file URL → new path
[[redirects]]
  from = "/Rek_Quote_Proposal_v2.html"
  to   = "/proposal"
  status = 301

# Redirect root → proposal tool (default landing)
[[redirects]]
  from = "/"
  to   = "/proposal"
  status = 302

# Procurement tool
[[redirects]]
  from = "/procurement"
  to   = "/procurement/index.html"
  status = 200
